services:
  front:
    build:
      context: ./front
      target: ${FRONTEND_TARGET:-production}
      args:
        - NUXT_PUBLIC_API_BASE=https://oa.cioospacificlabs.ca/api
    ports:
      - "${FRONT_PORT:-3000}:3000"
    volumes: []
    environment:
      - NUXT_PUBLIC_API_BASE=https://oa.cioospacificlabs.ca/api
    depends_on:
      - api
      - umami
    env_file:
      - .env.prod
    command: ${FRONTEND_COMMAND:-npm run start}
    restart: unless-stopped

  # Add Umami Service
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: always
    environment:
      DATABASE_URL: postgresql://umami:umami_pass@umami-db:5432/umami
      APP_SECRET: $(openssl rand -hex 32) # You should replace this with a static random string
    ports:
      - "3001:3000" # Maps Umami dashboard to port 3001
    depends_on:
      umami-db:
        condition: service_healthy

  # Add Umami Database
  umami-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami_pass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - umami-db-data:/var/lib/postgresql/data
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - ./data:/opt/data
      # - ./lib:/app/lib
      # - ./bathymetry_images:/app/bathymetry_images
      # - ./trajectory_maps:/app/trajectory_maps
    environment:
      - DB_HOST=db
      - DB_NAME=oa
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - HDF5_USE_FILE_LOCKING=FALSE
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgis/postgis:16-master
    environment:
      - POSTGRES_DB=oa
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - oa_db:/var/lib/postgresql/data
      # - ./DB:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  process:
    build:
      context: .
      dockerfile: process/Dockerfile
    # profiles: ["tools"]
    environment:
      - PGHOST=db
      - PGPORT=5432  # default Postgres port inside the Docker network
      - PGDATABASE=oa
      - PGUSER=postgres
      - PGPASSWORD=postgres
    volumes:
      # - ./lib:/app/lib
      - ./data:/opt/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  oa_db:
  umami-db-data: