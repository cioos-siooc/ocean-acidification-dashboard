services:
  front:
    build:
      context: ./front
      target: ${FRONTEND_TARGET:-production}
      args:
        - NUXT_PUBLIC_API_BASE=${NUXT_PUBLIC_API_BASE:-https://oa.cioospacificlabs.ca/api}
    ports:
      - "${FRONT_PORT:-3000}:3000"
    volumes: []
    environment:
      - NUXT_PUBLIC_API_BASE=${NUXT_PUBLIC_API_BASE:-https://oa.cioospacificlabs.ca/api}
    env_file:
      - .env.prod
    command: ${FRONTEND_COMMAND:-npm run start}
    restart: unless-stopped
