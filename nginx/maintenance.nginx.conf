# Ocean Acidification Dashboard — nginx config with maintenance mode
#
# Place the maintenance page at: ./maintenance/oa/maintenance.html
#
# Enable maintenance:
#   touch ./maintenance/oa/maintenance.flag && sudo nginx -s reload
#
# Disable maintenance:
#   rm ./maintenance/oa/maintenance.flag && sudo nginx -s reload

server {
    server_name oa.cioospacificlabs.ca;

    # Maintenance flag check
    set $maintenance 0;
    if (-f /maintenance/oa/maintenance.flag) {
        set $maintenance 1;
    }

    error_page 503 /maintenance.html;

    location = /maintenance.html {
        root /maintenance/oa;
        internal;
    }

    location / {
        if ($maintenance = 1) {
            return 503;
        }
        proxy_pass http://host.docker.internal:9010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/oa.cioospacificlabs.ca/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/oa.cioospacificlabs.ca/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = oa.cioospacificlabs.ca) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name oa.cioospacificlabs.ca;

    listen 80;
    return 404; # managed by Certbot
}
