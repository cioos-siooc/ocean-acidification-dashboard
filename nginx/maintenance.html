<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scheduled Maintenance — Ocean Acidification Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1b2a;
      color: #e0eaf5;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .card {
      max-width: 540px;
      width: 90%;
      text-align: center;
      padding: 3rem 2rem;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: #7ec8e3;
    }
    p {
      font-size: 1rem;
      line-height: 1.7;
      color: #a8bfd4;
      margin-bottom: 0.75rem;
    }
    .footer {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: #4a6580;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌊</div>
    <h1>Scheduled Maintenance</h1>
    <p>
      The Ocean Acidification Dashboard is temporarily offline for scheduled maintenance.
    </p>
    <p>
      We'll be back shortly. Thank you for your patience.
    </p>
    <div class="footer">
      CIOOS Pacific &mdash; cioospacific.ca
    </div>
  </div>
</body>
</html>
