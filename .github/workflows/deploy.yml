name: Deploy Nuxt to Cloudflare Pages

on:
  push:
    branches:
      - main  # Or whichever branch you want to trigger the deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Change to 'pnpm' or 'yarn' if needed

      - name: Install dependencies
        run: npm install

      - name: Build Nuxt App
        # Nuxt automatically detects Cloudflare if you set the NITRO_PRESET
        run: npx nuxi build
        env:
          NITRO_PRESET: cloudflare-pages

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .output/public --project-name=my-nuxt-app