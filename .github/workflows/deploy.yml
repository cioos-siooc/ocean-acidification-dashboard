name: Deploy Nuxt to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        working-directory: front
        run: npm ci --legacy-peer-deps

      - name: Verify environment variables
        working-directory: front
        run: |
          echo "API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL:-(empty)}"
          echo "MAPBOX_TOKEN: ${NUXT_PUBLIC_MAPBOX_TOKEN:0:10}..." 
          echo "VERSION: ${NUXT_PUBLIC_VERSION:-(empty)}"
        env:
          NUXT_PUBLIC_API_BASE_URL: ${{ secrets.NUXT_PUBLIC_API_BASE_URL }}
          NUXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NUXT_PUBLIC_MAPBOX_TOKEN }}
          NUXT_PUBLIC_VERSION: ${{ secrets.NUXT_PUBLIC_VERSION }}

      - name: Build Nuxt App
        working-directory: front
        run: npm run build
        env:
          NITRO_PRESET: cloudflare-pages
          NUXT_PUBLIC_API_BASE_URL: ${{ secrets.NUXT_PUBLIC_API_BASE_URL }}
          NUXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NUXT_PUBLIC_MAPBOX_TOKEN }}
          NUXT_PUBLIC_VERSION: ${{ secrets.NUXT_PUBLIC_VERSION }}

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy front/dist --project-name=oah --commit-dirty=true